<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('mitl-theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Man in the Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="web/base.css">
  <link rel="stylesheet" href="web/components.css">
  <style>
    html { font-size: 120%; }
    body { overflow: hidden; }
    a.tnav-btn { text-decoration: none; display: inline-flex; align-items: center; }

    /* Map fills viewport below the two navbars */
    #map {
      position: fixed;
      top: calc(var(--nav-h) + var(--tab-h));
      left: 0; right: 0;
      bottom: 32px; /* leave room for status bar */
    }

    /* Status bar */
    #map-status {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 32px;
      background: rgba(0,0,0,0.9); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 20px;
      z-index: 450;
      font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-faint);
    }
    .ms-stat { display: flex; align-items: baseline; gap: 5px; }
    .ms-val { color: var(--accent); font-weight: var(--fw-bold); }
    .ms-sep { width: 1px; height: 12px; background: var(--border); flex-shrink: 0; }

    /* Leaflet dark overrides */
    .leaflet-control-zoom a {
      background: var(--surface) !important; color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.7) !important; color: var(--text-faint) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(0,255,65,0.6) !important; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; border: 1px solid var(--border) !important;
      border-radius: 4px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
      color: var(--text-primary) !important; font-family: var(--font) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--text-faint) !important; }
    .leaflet-popup-close-button:hover { color: var(--text-primary) !important; }

    .pop-name { font-size: var(--fs-body); font-weight: var(--fw-bold); color: var(--text-primary); margin-bottom: 3px; }
    .pop-meta { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-faint); }
    .pop-contrib { color: rgba(100,160,255,0.9); font-weight: var(--fw-bold); }
    .pop-link {
      display: inline-block; margin-top: 8px;
      font-family: var(--font-mono); font-size: var(--fs-xs);
      color: var(--accent); text-decoration: none;
    }
    .pop-link:hover { text-decoration: underline; }

    /* Filter pill bar (top-right overlay) */
    #map-filters {
      position: fixed;
      top: calc(var(--nav-h) + var(--tab-h) + 12px);
      right: 12px; z-index: 450;
      display: flex; gap: 6px; flex-direction: column; align-items: flex-end;
    }
    .mf-group { display: flex; gap: 4px; }
    .mf-pill {
      font-family: var(--font-mono); font-size: var(--fs-xs);
      border-radius: 50px; padding: 3px 10px; cursor: pointer;
      border: 1px solid var(--border); color: var(--dim); background: rgba(0,0,0,0.8);
      transition: all .1s; white-space: nowrap;
    }
    .mf-pill:hover { border-color: var(--grey-mid); color: var(--text-secondary); }
    .mf-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,65,0.07); }
    .mf-lbl { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-faint); padding-right: 4px; }
  </style>
</head>
<body>

<!-- ── Topnav ── -->
<div id="topnav">
  <a href="index.html" class="brand">Man in the Loop <span>—</span> <span class="brand-infonodes">info<span class="brand-dot">.</span>nodes</span></a>
  <span style="margin-left:auto;"></span>
  <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()">◑ LIGHT</button>
</div>

<!-- ── Tabnav ── -->
<div id="tabnav">
  <a href="index.html" class="tnav-btn active">Map</a>
  <a href="networks.html" class="tnav-btn">Networks</a>
  <a href="search.html" class="tnav-btn">Search</a>
  <a href="publications.html" class="tnav-btn">Publications</a>
  <a href="about.html" class="tnav-btn">About</a>
</div>

<!-- ── Map ── -->
<div id="map"></div>

<!-- ── Filter pills ── -->
<div id="map-filters">
  <div class="mf-group">
    <span class="mf-lbl">Show</span>
    <button class="mf-pill active" data-filter="all">All</button>
    <button class="mf-pill" data-filter="merged">DB+EDF</button>
    <button class="mf-pill" data-filter="edf">EDF only</button>
  </div>
</div>

<!-- ── Status bar ── -->
<div id="map-status">
  <span class="ms-stat"><span class="ms-val" id="ms-total">—</span> orgs</span>
  <span class="ms-sep"></span>
  <span class="ms-stat"><span class="ms-val" id="ms-edf">—</span> EDF funded</span>
  <span class="ms-sep"></span>
  <span class="ms-stat"><span class="ms-val" id="ms-countries">—</span> countries</span>
  <span style="margin-left:auto;">CartoDB Dark Matter · EDF beneficiary data</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="web/theme.js"></script>
<script type="module">
'use strict';

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtEur(val) {
  const n = parseFloat(val);
  if (!val || isNaN(n) || n === 0) return null;
  if (n >= 1e9) return `€${(n/1e9).toFixed(1)}B`;
  if (n >= 1e6) return `€${(n/1e6).toFixed(1)}M`;
  if (n >= 1e3) return `€${(n/1e3).toFixed(0)}K`;
  return `€${n.toFixed(0)}`;
}

// Rough country centroids for EDF countries
const COUNTRY_LL = {
  'Austria':        [47.5, 14.5],
  'Belgium':        [50.5,  4.4],
  'Bulgaria':       [42.8, 25.5],
  'Croatia':        [45.1, 15.2],
  'Cyprus':         [35.1, 33.4],
  'Czech Republic': [49.8, 15.5],
  'Denmark':        [56.3,  9.5],
  'Estonia':        [58.6, 25.0],
  'Finland':        [64.0, 26.0],
  'France':         [46.2,  2.2],
  'Germany':        [51.2, 10.4],
  'Greece':         [39.1, 21.8],
  'Hungary':        [47.2, 19.5],
  'Ireland':        [53.1, -8.2],
  'Israel':         [31.5, 35.0],
  'Italy':          [42.8, 12.8],
  'Latvia':         [56.9, 24.6],
  'Lithuania':      [55.9, 23.9],
  'Luxembourg':     [49.8,  6.1],
  'Malta':          [35.9, 14.5],
  'Netherlands':    [52.4,  5.3],
  'Norway':         [64.5, 17.5],
  'Poland':         [52.1, 19.1],
  'Portugal':       [39.6, -8.0],
  'Romania':        [45.9, 24.9],
  'Slovakia':       [48.7, 19.7],
  'Slovenia':       [46.1, 14.8],
  'Spain':          [40.2, -3.7],
  'Sweden':         [62.0, 15.0],
  'Switzerland':    [46.8,  8.2],
  'Turkey':         [39.1, 35.2],
  'United Kingdom': [54.0, -2.5],
};

function jitter(ll, scale = 0.7) {
  return [ll[0] + (Math.random() - 0.5) * scale, ll[1] + (Math.random() - 0.5) * scale * 2];
}

// Init Leaflet
const map = L.map('map', { center: [52, 12], zoom: 4, zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Layer groups
const layers = { all: L.layerGroup().addTo(map), merged: L.layerGroup(), edf: L.layerGroup() };

async function init() {
  const [orgsRes, dbRes] = await Promise.all([
    fetch('data/edf_orgs.json'),
    fetch('data/database.json'),
  ]);
  const orgsData = await orgsRes.json();
  const dbData   = await dbRes.json();

  const dbMap = {};
  for (const e of dbData.entities) dbMap[e.id] = e;

  const orgs = Object.values(orgsData.orgs);
  const countrySet = new Set();

  for (const org of orgs) {
    const country = org.country || '';
    const ll = COUNTRY_LL[country];
    if (!ll) continue;
    countrySet.add(country);

    const jittered = jitter(ll);
    const eu = fmtEur(org.total_eu_contribution);
    const hasMerge = !!org.db_id;
    const kind = hasMerge ? 'merged' : 'edf';

    const marker = L.circleMarker(jittered, {
      radius:      4,
      fillColor:   hasMerge ? '#ffd700' : '#00ff41',
      fillOpacity: 0.65,
      color:       hasMerge ? '#ffd700' : '#00ff41',
      weight:      1,
      opacity:     0.5,
    }).bindPopup(`
      <div class="pop-name">${esc(org.organization_name)}</div>
      <div class="pop-meta">
        ${esc(country)}${org.city ? ' · ' + esc(org.city) : ''}
        ${eu ? ' · <span class="pop-contrib">' + eu + '</span>' : ''}
      </div>
      <a href="search.html" class="pop-link">→ View in Search</a>
    `, { maxWidth: 280 });

    layers.all.addLayer(marker);
    layers[kind].addLayer(marker);
  }

  document.getElementById('ms-total').textContent    = orgs.length;
  document.getElementById('ms-edf').textContent      = orgs.filter(o => !o.db_id).length;
  document.getElementById('ms-countries').textContent = countrySet.size;
}

// Filter pills
let activeFilter = 'all';
document.querySelectorAll('.mf-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mf-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    if (f === activeFilter) return;
    map.removeLayer(layers[activeFilter]);
    map.addLayer(layers[f]);
    activeFilter = f;
  });
});

init().catch(err => console.error('Map data load failed:', err));
</script>
</body>
</html>
