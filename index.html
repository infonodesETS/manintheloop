<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>info.nodes — experiments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#fff;
  font-family:'Barlow Condensed','Inter',sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── GLOBAL NAV ── */
#in-nav {
  position:fixed; top:0; left:0; right:0; height:44px; z-index:9999;
  background:#000; border-bottom:1px solid rgb(65,67,69);
  display:flex; align-items:center; padding:0 24px; gap:24px;
}
.in-brand {
  font-size:1.5rem; font-weight:700; color:#fff; text-decoration:none;
  letter-spacing:1px; text-transform:uppercase; flex-shrink:0;
}
.in-brand span { color:#68CCD1; }
.in-links { display:flex; gap:4px; margin-left:auto; }
.in-link {
  font-size:1.3rem; font-weight:700; color:rgba(255,255,255,0.45);
  text-decoration:none; padding:5px 16px; border-radius:50px;
  border:1px solid transparent; transition:all .15s; letter-spacing:.3px;
  font-family:'Barlow Condensed',sans-serif;
}
.in-link:hover { color:#fff; border-color:rgb(65,67,69); background:rgba(255,255,255,0.05); }
.in-link.active { color:#000; background:#68CCD1; border-color:#68CCD1; }

/* ── HERO ── */
main {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding-top:44px;
}

.terminal-line {
  font-family:'JetBrains Mono','Courier New',monospace;
  color:#00ff41;
  font-size:1.35rem;
  display:flex;
  align-items:center;
  text-shadow:0 0 12px rgba(0,255,65,0.4);
}

.cursor {
  display:inline-block;
  width:0.55em;
  height:1.1em;
  background:#00ff41;
  margin-left:3px;
  vertical-align:text-bottom;
  box-shadow:0 0 8px rgba(0,255,65,0.6);
  animation:blink 1s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity:1; }
  50%       { opacity:0; }
}
</style>
</head>
<body>

<nav id="in-nav">
  <a href="./" class="in-brand">info<span>.</span>nodes</a>
  <div class="in-links">
    <a href="crunchbase_scraping/test_startup/" class="in-link">Startup Map</a>
    <a href="crunchbase_full/"                  class="in-link">Investment Map</a>
    <a href="wikidata_inspector/"               class="in-link">Wikidata</a>
    <a href="call-checker_infonodes/"           class="in-link">CallChecker</a>
  </div>
</nav>

<main>
  <div class="terminal-line">
    Hello World! This is an Info.nodes experiment!<span class="cursor"></span>
  </div>
</main>

</body>
</html>
