<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity Profile — Man in the Loop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<style>
/* ── Page base overrides ─────────────────────────────────────────────────── */
html { font-size: 120%; }
body { overflow: auto; padding-top: 0; min-height: 100vh; background: #000; }

/* ── Sticky topnav ───────────────────────────────────────────────────────── */
#ep-nav {
  position: sticky; top: 0; z-index: 500;
  background: #000; border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  height: var(--nav-h);
}
#ep-back {
  display: none;
  margin-left: auto;
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--dim); background: none;
  border: 1px solid var(--border); border-radius: 50px;
  padding: 2px 14px; cursor: pointer; transition: all .1s;
}
#ep-back.visible { display: inline-block; }
#ep-back:hover { border-color: var(--accent); color: var(--accent); }

/* ── Hero ────────────────────────────────────────────────────────────────── */
#ep-hero {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - var(--nav-h));
  padding: 48px 20px;
  transition: min-height .4s cubic-bezier(.4,0,.2,1),
              padding    .4s cubic-bezier(.4,0,.2,1),
              background .4s;
}
#ep-hero.compact {
  min-height: 0;
  padding: 24px 20px 20px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
}

/* Hero copy */
.ep-hero-prompt {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: rgba(0,255,65,0.45); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 18px;
  transition: opacity .25s, max-height .3s;
}
.ep-hero-title {
  font-family: var(--font-mono); font-size: var(--fs-xl);
  color: var(--accent); font-weight: var(--fw-normal);
  text-shadow: 0 0 18px rgba(0,255,65,0.3);
  margin-bottom: 32px; line-height: var(--lh-tight);
  text-align: center;
  transition: opacity .25s, max-height .3s;
}
.ep-hero-title .ep-cursor {
  display: inline-block; width: 0.5em; height: 1em;
  background: var(--accent); margin-left: 4px;
  vertical-align: text-bottom;
  box-shadow: 0 0 8px rgba(0,255,65,0.6);
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#ep-hero.compact .ep-hero-prompt,
#ep-hero.compact .ep-hero-title { display: none; }

/* Search input wrapper */
.ep-search-wrap {
  position: relative;
  width: 100%; max-width: 580px;
  transition: max-width .4s cubic-bezier(.4,0,.2,1);
}
#ep-hero.compact .ep-search-wrap { max-width: 440px; }

#ep-search {
  width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: #fff;
  font-family: var(--font); font-size: var(--fs-lg);
  padding: 14px 48px 14px 20px;
  outline: none;
  transition: border-color .15s, box-shadow .15s, font-size .3s, padding .3s;
}
#ep-hero.compact #ep-search {
  font-size: var(--fs-body); padding: 10px 42px 10px 16px;
}
#ep-search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,255,65,0.12);
}
#ep-search::placeholder { color: var(--dim); }

.ep-search-icon {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--dim); font-family: var(--font-mono); font-size: var(--fs-sm);
  pointer-events: none;
}

/* Showing label */
.ep-showing {
  margin-top: 12px;
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: rgba(0,255,65,0.45); letter-spacing: 1px;
  text-transform: uppercase; display: none;
}
#ep-hero.compact .ep-showing { display: block; }

/* ── Autocomplete ────────────────────────────────────────────────────────── */
#ep-ac {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: #111; border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 12px 40px rgba(0,0,0,.8);
  max-height: 380px; overflow-y: auto;
  display: none; z-index: 300;
}
#ep-ac.open { display: block; }
.ep-ac-group {
  padding: 7px 16px 5px;
  font-size: var(--fs-xs); text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-faint);
  font-weight: var(--fw-bold);
  background: var(--surface3);
  border-bottom: 1px solid rgba(65,67,69,0.4);
}
.ep-ac-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(65,67,69,0.25);
  transition: background .08s;
}
.ep-ac-item:last-child { border-bottom: none; }
.ep-ac-item:hover, .ep-ac-item.kbd { background: rgba(0,255,65,0.07); }
.ep-ac-name {
  flex: 1; font-size: var(--fs-base);
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ep-ac-name mark { background: none; color: var(--accent); font-weight: var(--fw-bold); }
.ep-ac-country { font-size: var(--fs-xs); color: var(--dim); flex-shrink: 0; }
.ep-ac-id {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint); flex-shrink: 0;
}
.ep-ac-empty {
  padding: 20px 16px; text-align: center;
  font-size: var(--fs-sm); color: var(--text-muted);
}

/* ── Profile ─────────────────────────────────────────────────────────────── */
#ep-profile {
  display: none;
  max-width: 1120px; margin: 0 auto;
  padding: 32px 20px 72px;
  animation: fadeUp .3s ease both;
}
#ep-profile.visible { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Header card */
.ep-hdr-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 28px 32px;
  margin-bottom: 20px;
  display: flex; gap: 24px; align-items: flex-start;
}
.ep-logo {
  width: 72px; height: 72px; flex-shrink: 0;
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: var(--fs-xl);
  color: var(--accent); letter-spacing: -1px;
  text-shadow: 0 0 12px rgba(0,255,65,0.35);
}
.ep-hdr-main { flex: 1; min-width: 0; }
.ep-hdr-name {
  font-size: var(--fs-xl); font-weight: var(--fw-bold);
  color: #fff; line-height: var(--lh-tight);
  text-transform: uppercase; letter-spacing: .3px;
  margin-bottom: 10px;
}
.ep-hdr-badges {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 12px;
}
.ep-hdr-id {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint);
}
.ep-hdr-desc {
  font-size: var(--fs-body); color: var(--text-secondary);
  line-height: var(--lh-body); max-width: 640px;
  margin-bottom: 14px;
}
.ep-ext-links { display: flex; flex-wrap: wrap; gap: 8px; }
.ep-ext-link {
  font-size: var(--fs-xs); font-family: var(--font-mono);
  color: var(--dim); border: 1px solid var(--border);
  border-radius: 50px; padding: 3px 13px;
  text-decoration: none; transition: all .1s; white-space: nowrap;
}
.ep-ext-link:hover           { border-color: var(--accent); color: var(--accent); }
.ep-ext-link.ep-cb           { border-color: rgba(244,161,71,.4); color: rgba(244,161,71,.85); }
.ep-ext-link.ep-cb:hover     { border-color: #f4a147; color: #f4a147; }
.ep-ext-link.ep-wd           { border-color: rgba(104,204,209,.35); color: rgba(104,204,209,.8); }
.ep-ext-link.ep-wd:hover     { border-color: rgba(104,204,209,.9); color: rgba(104,204,209,1); }

/* Stat bar */
.ep-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.ep-stat {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
}
.ep-stat-val {
  font-size: var(--fs-stat); font-weight: var(--fw-bold);
  color: var(--accent); font-family: var(--font-mono);
  line-height: 1; margin-bottom: 5px;
}
.ep-stat-lbl {
  font-size: var(--fs-xs); color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .6px;
}

/* Two-column body */
.ep-cols {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px; align-items: start;
}
@media (max-width: 900px) {
  .ep-cols { grid-template-columns: 1fr; }
  .ep-hdr-card { flex-direction: column; }
  .ep-logo { width: 56px; height: 56px; font-size: var(--fs-lg); }
  .ep-stats { grid-template-columns: repeat(2,1fr); }
}

/* Section card */
.ep-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; margin-bottom: 16px;
}
.ep-card-hdr {
  padding: 9px 18px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  font-size: var(--fs-xs); text-transform: uppercase;
  letter-spacing: 1.1px; color: var(--accent); font-weight: var(--fw-bold);
  display: flex; align-items: center; justify-content: space-between;
}
.ep-card-count {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint); font-weight: 400; letter-spacing: 0;
}
.ep-card-body { padding: 16px 18px; }

/* Row: label + value */
.ep-row {
  display: flex; gap: 12px; align-items: baseline;
  padding: .38rem 0;
  border-bottom: 1px solid rgba(65,67,69,.22);
}
.ep-row:last-child { border-bottom: none; }
.ep-row-lbl {
  font-size: var(--fs-sm); font-weight: var(--fw-bold);
  text-transform: uppercase; letter-spacing: .4px;
  color: var(--dim); min-width: 108px; flex-shrink: 0;
}
.ep-row-val {
  font-size: var(--fs-base); color: var(--text-primary);
  word-break: break-word; flex: 1;
}
.ep-row-val a { color: var(--accent); text-decoration: none; }
.ep-row-val a:hover { text-decoration: underline; }
.ep-row-val code {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--grey-light);
}

/* Tag cloud */
.ep-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.ep-tag {
  font-size: var(--fs-xs);
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 50px; padding: 2px 10px; color: var(--dim);
}

/* Founders */
.ep-founders { display: flex; flex-wrap: wrap; gap: 8px; }
.ep-founder {
  font-size: var(--fs-sm); font-family: var(--font-mono);
  background: rgba(0,255,65,.05);
  border: 1px solid rgba(0,255,65,.2);
  border-radius: 4px; padding: 4px 12px;
  color: rgba(0,255,65,.75);
}

/* Entity list */
.ep-elist { list-style: none; padding: 0; margin: 0; }
.ep-elist li {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(65,67,69,.22);
  font-size: var(--fs-base); color: rgba(255,255,255,.78);
}
.ep-elist li:last-child { border-bottom: none; }
.ep-elist li .badge-lead { margin-left: auto; }
.ep-elist-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Relationship sub-header */
.ep-rel-group-lbl {
  font-size: var(--fs-xs); text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent);
  font-weight: var(--fw-bold);
  padding: 12px 0 6px;
  border-bottom: 1px solid rgba(65,67,69,.4);
  margin-bottom: 4px;
}

/* History */
.ep-hist { list-style: none; padding: 0; margin: 0; }
.ep-hist-item {
  display: grid; grid-template-columns: 86px 1fr;
  gap: 12px; padding: 9px 0;
  border-bottom: 1px solid rgba(65,67,69,.2);
}
.ep-hist-item:last-child { border-bottom: none; }
.ep-hist-date {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint); padding-top: 2px;
}
.ep-hist-desc {
  font-size: var(--fs-sm); color: var(--text-secondary);
  line-height: var(--lh-snug);
}
.ep-hist-meta {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint); margin-top: 3px;
}

/* Right column: source blocks */
.ep-src-block {
  border-radius: 8px; padding: 14px 16px; margin-bottom: 16px;
}
.ep-src-block.ep-cb-block {
  background: rgba(244,161,71,.04);
  border: 1px solid rgba(244,161,71,.18);
}
.ep-src-block.ep-wd-block {
  background: rgba(104,204,209,.04);
  border: 1px solid rgba(104,204,209,.15);
}
.ep-src-hdr {
  font-size: var(--fs-xs); font-weight: var(--fw-bold);
  text-transform: uppercase; letter-spacing: .7px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 7px;
}
.ep-src-hdr::before {
  content: ''; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.ep-cb-block .ep-src-hdr { color: rgba(244,161,71,.8); }
.ep-cb-block .ep-src-hdr::before { background: rgba(244,161,71,.7); }
.ep-wd-block .ep-src-hdr { color: rgba(104,204,209,.75); }
.ep-wd-block .ep-src-hdr::before { background: rgba(104,204,209,.65); }

.ep-src-ts {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  color: var(--text-faint); margin-top: 10px;
}
.ep-src-desc {
  font-size: var(--fs-sm); color: var(--text-secondary);
  line-height: var(--lh-body); margin-bottom: 10px;
}

/* Validation flags */
.ep-val-item {
  display: flex; gap: 9px; align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid rgba(65,67,69,.22);
  font-size: var(--fs-sm);
}
.ep-val-item:last-child { border-bottom: none; }
.ep-val-badge {
  font-family: var(--font-mono); font-size: var(--fs-xs);
  white-space: nowrap; flex-shrink: 0;
}
.ep-val-badge.flagged      { color: #ff4444; }
.ep-val-badge.needs_review { color: #ffaa44; }
.ep-val-desc { color: var(--text-secondary); line-height: var(--lh-snug); }

/* Empty/NA */
.ep-na {
  font-size: var(--fs-sm); color: var(--text-muted); font-style: italic;
}

/* Section sub-label */
.ep-sub-lbl {
  font-size: var(--fs-xs); text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-faint);
  font-weight: var(--fw-bold); margin: 12px 0 6px;
}

/* Scrollbar inside autocomplete */
#ep-ac::-webkit-scrollbar { width: 4px; }
#ep-ac::-webkit-scrollbar-track { background: #111; }
#ep-ac::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Top nav ─────────────────────────────────────────────────────────────── -->
<nav id="ep-nav">
  <a href="./" class="brand">
    Man in the Loop <span>—</span>
    <span class="brand-infonodes">info<span class="brand-dot">.</span>nodes</span>
  </a>
  <span class="brand-wip">Entity Profile</span>
  <button id="ep-back">↩ new search</button>
</nav>

<!-- ── Search hero ─────────────────────────────────────────────────────────── -->
<div id="ep-hero">
  <div class="ep-hero-prompt">info.nodes — defence supply chain explorer</div>
  <div class="ep-hero-title">
    Search for a Company<span class="ep-cursor"></span>
  </div>

  <div class="ep-search-wrap">
    <input
      id="ep-search"
      type="text"
      placeholder="Company or investor name…"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search entities"
      aria-autocomplete="list"
      aria-controls="ep-ac"
    >
    <span class="ep-search-icon">⌕</span>
    <div id="ep-ac" role="listbox"></div>
  </div>

  <div class="ep-showing" id="ep-showing"></div>
</div>

<!-- ── Profile ─────────────────────────────────────────────────────────────── -->
<div id="ep-profile">

  <!-- Header card -->
  <div class="ep-hdr-card">
    <div class="ep-logo" id="ep-logo"></div>
    <div class="ep-hdr-main">
      <div class="ep-hdr-name" id="ep-name"></div>
      <div class="ep-hdr-badges" id="ep-badges"></div>
      <div class="ep-hdr-desc" id="ep-desc" style="display:none"></div>
      <div class="ep-ext-links" id="ep-links"></div>
    </div>
  </div>

  <!-- Stat bar -->
  <div class="ep-stats" id="ep-stats"></div>

  <!-- Two columns -->
  <div class="ep-cols">

    <!-- LEFT ── -->
    <div id="ep-left">

      <!-- Key facts -->
      <div class="ep-card" id="ep-facts-card">
        <div class="ep-card-hdr">Key Facts</div>
        <div class="ep-card-body" id="ep-facts-body"></div>
      </div>

      <!-- Full description -->
      <div class="ep-card" id="ep-about-card" style="display:none">
        <div class="ep-card-hdr">About</div>
        <div class="ep-card-body" id="ep-about-body"></div>
      </div>

      <!-- Founders -->
      <div class="ep-card" id="ep-founders-card" style="display:none">
        <div class="ep-card-hdr">Founders</div>
        <div class="ep-card-body" id="ep-founders-body"></div>
      </div>

      <!-- Industries & focus -->
      <div class="ep-card" id="ep-ind-card" style="display:none">
        <div class="ep-card-hdr">Industries &amp; Focus</div>
        <div class="ep-card-body" id="ep-ind-body"></div>
      </div>

      <!-- Investors / Portfolio -->
      <div class="ep-card" id="ep-rel-card">
        <div class="ep-card-hdr">
          <span id="ep-rel-hdr-lbl">Connections</span>
          <span class="ep-card-count" id="ep-rel-hdr-count"></span>
        </div>
        <div class="ep-card-body" id="ep-rel-body"></div>
      </div>

      <!-- History -->
      <div class="ep-card" id="ep-hist-card" style="display:none">
        <div class="ep-card-hdr">
          <span>Change History</span>
          <span class="ep-card-count" id="ep-hist-count"></span>
        </div>
        <div class="ep-card-body" style="padding:10px 18px">
          <ul class="ep-hist" id="ep-hist-list"></ul>
        </div>
      </div>

    </div><!-- /LEFT -->

    <!-- RIGHT ── -->
    <div id="ep-right">

      <!-- Crunchbase -->
      <div class="ep-src-block ep-cb-block" id="ep-cb-block">
        <div class="ep-src-hdr">Crunchbase</div>
        <div id="ep-cb-body"></div>
      </div>

      <!-- Wikidata -->
      <div class="ep-src-block ep-wd-block" id="ep-wd-block">
        <div class="ep-src-hdr">Wikipedia / Wikidata</div>
        <div id="ep-wd-body"></div>
      </div>

      <!-- Validation flags -->
      <div class="ep-card" id="ep-val-card" style="display:none">
        <div class="ep-card-hdr">
          <span>Data Flags</span>
          <span class="ep-card-count" id="ep-val-count"></span>
        </div>
        <div class="ep-card-body" id="ep-val-body"></div>
      </div>

    </div><!-- /RIGHT -->

  </div><!-- /ep-cols -->
</div><!-- /ep-profile -->

<script type="module">
'use strict';

/* ── Utils ─────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtFunding(n) {
  if (!n) return null;
  if (n >= 1e9) return `$${(n/1e9).toFixed(1)}B`;
  if (n >= 1e6) return `$${(n/1e6).toFixed(0)}M`;
  return `$${n.toLocaleString()}`;
}
function initials(name) {
  return name.split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '?';
}
function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

const SECTOR_COLORS = {
  Defence: 'var(--c-defence)', Mining: 'var(--c-mining)',
  Tech: 'var(--c-tech)', Startup: 'var(--c-startup)',
};
const TYPE_LABELS = {
  fund:'Fund', government_agency:'Gov Agency',
  bank:'Bank', institution:'Institution', company:'Manufacturer',
};

function sectorBadge(s) {
  return s ? `<span class="badge-sector badge-${esc(s)}">${esc(s)}</span>` : '';
}
function typeBadge(t) {
  return `<span class="badge-type badge-type--${esc(t||'company')}">${TYPE_LABELS[t]||esc(t||'Unknown')}</span>`;
}
function dualBadge() {
  return `<span class="badge-dual">⟲ investor</span>`;
}
function row(lbl, val) {
  return `<div class="ep-row">
    <span class="ep-row-lbl">${lbl}</span>
    <span class="ep-row-val">${val}</span>
  </div>`;
}

/* ── State ─────────────────────────────────────────────────────────────── */
let ENTITIES = [];    // all enriched entities
let BY_ID    = {};    // id → entity
let REL_MAP  = {};    // id → [{rel, role:'investor'|'target', other}]

/* ── Load ──────────────────────────────────────────────────────────────── */
async function loadData() {
  const db = await fetch('data/database.json').then(r => r.json());

  // Index entities
  for (const e of db.entities) BY_ID[e.id] = e;

  // Build relationship maps
  for (const rel of db.relationships) {
    if (rel.type !== 'investment') continue;
    if (!REL_MAP[rel.source]) REL_MAP[rel.source] = [];
    if (!REL_MAP[rel.target]) REL_MAP[rel.target] = [];
    REL_MAP[rel.source].push({ rel, role:'investor', other: BY_ID[rel.target] || null });
    REL_MAP[rel.target].push({ rel, role:'target',   other: BY_ID[rel.source] || null });
  }

  // Build searchable entity list
  ENTITIES = db.entities.map(e => ({
    ...e,
    _key: [
      e.name,
      e.sources?.crunchbase?.headquarters,
      e.sources?.infonodes?.country,
      e.sources?.wikidata?.country,
      e.sources?.crunchbase?.domain,
    ].filter(Boolean).join(' ').toLowerCase(),
  }));
}

/* ── Autocomplete ──────────────────────────────────────────────────────── */
const searchEl = document.getElementById('ep-search');
const acEl     = document.getElementById('ep-ac');

let acFlatList = [];   // flat ordered list of entities matching current query
let acKbd      = -1;   // keyboard-focused index

function closeAc() {
  acEl.classList.remove('open');
  acEl.innerHTML = '';
  acKbd = -1;
  acFlatList = [];
}

function renderAc(raw) {
  const q = raw.trim().toLowerCase();
  if (!q) { closeAc(); return; }

  const scored = ENTITIES.map(e => {
    const n = e.name.toLowerCase();
    let s = 0;
    if (n === q)           s = 200;
    else if (n.startsWith(q)) s = 100;
    else if (n.includes(q))   s = 60;
    else if (e._key.includes(q)) s = 20;
    return { e, s };
  }).filter(x => x.s > 0).sort((a,b) => b.s - a.s || a.e.name.localeCompare(b.e.name));

  if (!scored.length) {
    acEl.innerHTML = `<div class="ep-ac-empty">No results for "<strong>${esc(raw)}</strong>"</div>`;
    acEl.classList.add('open');
    acFlatList = [];
    return;
  }

  const companies = scored.filter(x => x.e.id.startsWith('IN-'));
  const investors = scored.filter(x => x.e.id.startsWith('IV-'));
  acFlatList = [];
  let html = '';

  function renderGroup(label, items, limit) {
    if (!items.length) return;
    html += `<div class="ep-ac-group">${label}</div>`;
    for (const { e } of items.slice(0, limit)) {
      const country = e.sources?.infonodes?.country || e.sources?.wikidata?.country || '';
      const badge = e.sector ? sectorBadge(e.sector) : typeBadge(e.type);
      html += `<div class="ep-ac-item" role="option" data-idx="${acFlatList.length}">
        ${badge}
        <span class="ep-ac-name">${highlight(e.name, raw)}</span>
        ${country ? `<span class="ep-ac-country">${esc(country)}</span>` : ''}
        <span class="ep-ac-id">${esc(e.id)}</span>
      </div>`;
      acFlatList.push(e);
    }
  }

  renderGroup('Companies', companies, 14);
  renderGroup('Investors', investors, 10);

  acEl.innerHTML = html;
  acEl.classList.add('open');

  acEl.querySelectorAll('.ep-ac-item').forEach(el => {
    el.addEventListener('mousedown', ev => {
      ev.preventDefault();
      const idx = Number(el.dataset.idx);
      if (acFlatList[idx]) selectEntity(acFlatList[idx]);
    });
  });
}

function moveAcKbd(delta) {
  const items = acEl.querySelectorAll('.ep-ac-item');
  if (!items.length) return;
  items[acKbd]?.classList.remove('kbd');
  acKbd = Math.max(-1, Math.min(items.length - 1, acKbd + delta));
  if (acKbd >= 0) {
    items[acKbd].classList.add('kbd');
    items[acKbd].scrollIntoView({ block: 'nearest' });
    if (acFlatList[acKbd]) searchEl.value = acFlatList[acKbd].name;
  }
}

searchEl.addEventListener('input', () => { acKbd = -1; renderAc(searchEl.value); });
searchEl.addEventListener('keydown', e => {
  if (!acEl.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); moveAcKbd(+1); }
  else if (e.key === 'ArrowUp')  { e.preventDefault(); moveAcKbd(-1); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    const target = acKbd >= 0 ? acFlatList[acKbd] : acFlatList[0];
    if (target) selectEntity(target);
  }
  else if (e.key === 'Escape') closeAc();
});
searchEl.addEventListener('blur', () => setTimeout(closeAc, 160));

/* ── URL ───────────────────────────────────────────────────────────────── */
function getUrlEntity() { return new URLSearchParams(location.search).get('entity'); }
function setUrlEntity(id) {
  const p = new URLSearchParams(location.search);
  if (id) p.set('entity', id); else p.delete('entity');
  history.replaceState(null, '', `?${p.toString()}`);
}

/* ── Select ────────────────────────────────────────────────────────────── */
function selectEntity(entity) {
  closeAc();
  searchEl.value = entity.name;
  setUrlEntity(entity.id);
  document.getElementById('ep-hero').classList.add('compact');
  document.getElementById('ep-showing').textContent = entity.name;
  document.getElementById('ep-back').classList.add('visible');
  renderProfile(entity);
}

/* ── Clear ─────────────────────────────────────────────────────────────── */
document.getElementById('ep-back').addEventListener('click', () => {
  setUrlEntity(null);
  searchEl.value = '';
  document.getElementById('ep-hero').classList.remove('compact');
  document.getElementById('ep-showing').textContent = '';
  document.getElementById('ep-back').classList.remove('visible');
  document.getElementById('ep-profile').classList.remove('visible');
  searchEl.focus();
});

/* ── Render profile ─────────────────────────────────────────────────────── */
function renderProfile(entity) {
  const profile = document.getElementById('ep-profile');
  profile.classList.remove('visible');
  // Force re-animation
  void profile.offsetWidth;
  profile.classList.add('visible');

  const cb  = entity.sources?.crunchbase;
  const wd  = entity.sources?.wikidata;
  const inf = entity.sources?.infonodes;

  const isCompany  = entity.type === 'company';
  const isDual     = isCompany && entity.roles?.includes('investor');
  const rels       = REL_MAP[entity.id] || [];
  const asInvestor = rels.filter(r => r.role === 'investor');
  const asTarget   = rels.filter(r => r.role === 'target');

  /* Logo */
  document.getElementById('ep-logo').textContent = initials(entity.name);

  /* Name */
  document.getElementById('ep-name').textContent = entity.name;

  /* Badges */
  let badges = '';
  if (entity.sector) badges += sectorBadge(entity.sector);
  if (!isCompany || !entity.sector) badges += typeBadge(entity.type);
  if (isDual) badges += dualBadge();
  badges += `<span class="ep-hdr-id">${esc(entity.id)}</span>`;
  document.getElementById('ep-badges').innerHTML = badges;

  /* Short description in header */
  const shortDesc = cb?.description || wd?.description;
  const descEl = document.getElementById('ep-desc');
  if (shortDesc) {
    descEl.textContent = shortDesc;
    descEl.style.display = '';
  } else {
    descEl.style.display = 'none';
  }

  /* External links */
  let links = '';
  if (cb?.profile_url)       links += `<a class="ep-ext-link ep-cb" href="${esc(cb.profile_url)}" target="_blank">Crunchbase ↗</a>`;
  if (cb?.website)           links += `<a class="ep-ext-link" href="${esc(cb.website)}" target="_blank">${esc(cb.website.replace(/^https?:\/\/(www\.)?/,'').replace(/\/.*$/,''))} ↗</a>`;
  if (wd?.official_website && wd.official_website !== cb?.website)
                             links += `<a class="ep-ext-link" href="${esc(wd.official_website)}" target="_blank">Official site ↗</a>`;
  if (wd?.wikipedia_url)     links += `<a class="ep-ext-link ep-wd" href="${esc(wd.wikipedia_url)}" target="_blank">Wikipedia ↗</a>`;
  if (inf?.wikipedia_url && inf.wikipedia_url !== wd?.wikipedia_url)
                             links += `<a class="ep-ext-link ep-wd" href="${esc(inf.wikipedia_url)}" target="_blank">Wikipedia ↗</a>`;
  if (entity.wikidata_id)    links += `<a class="ep-ext-link ep-wd" href="https://www.wikidata.org/wiki/${esc(entity.wikidata_id)}" target="_blank">${esc(entity.wikidata_id)} ↗</a>`;
  document.getElementById('ep-links').innerHTML = links;

  /* Stat bar */
  const statsEl = document.getElementById('ep-stats');
  const stats = [];
  const funding = fmtFunding(cb?.total_funding_usd);
  if (funding)                      stats.push({ v: funding,                           l: 'Total Funding' });
  if (wd?.employees)                stats.push({ v: Number(wd.employees).toLocaleString(), l: 'Employees' });
  const founded = wd?.inception ? String(wd.inception).slice(0,4) : null;
  if (founded)                      stats.push({ v: founded,                           l: 'Founded' });
  if (cb?.cb_rank)                  stats.push({ v: `#${cb.cb_rank}`,                  l: 'CB Rank' });
  if (cb?.revenue_range)            stats.push({ v: esc(cb.revenue_range),              l: 'Revenue' });
  if (cb?.patents_granted != null && cb.patents_granted !== '')
                                    stats.push({ v: cb.patents_granted,                l: 'Patents' });
  if (isCompany && asTarget.length) stats.push({ v: asTarget.length,                   l: 'Investors' });
  if (asInvestor.length)            stats.push({ v: asInvestor.length,                 l: 'Portfolio' });
  statsEl.innerHTML = stats.map(s =>
    `<div class="ep-stat">
      <div class="ep-stat-val">${s.v}</div>
      <div class="ep-stat-lbl">${s.l}</div>
    </div>`
  ).join('');
  statsEl.style.display = stats.length ? '' : 'none';

  /* Key facts */
  const country = wd?.country || inf?.country;
  let factsHtml = '';
  if (country)              factsHtml += row('Country', esc(country));
  if (founded)              factsHtml += row('Founded', esc(founded));
  if (cb?.headquarters)     factsHtml += row('Headquarters', esc(cb.headquarters));
  if (cb?.stage)            factsHtml += row('Stage', esc(cb.stage));
  if (cb?.domain)           factsHtml += row('Domain', `<a href="https://${esc(cb.domain)}" target="_blank">${esc(cb.domain)} ↗</a>`);
  if (wd?.isin)             factsHtml += row('ISIN', `<code>${esc(wd.isin)}</code>`);
  if (cb?.investor_type)    factsHtml += row('Investor type', esc(cb.investor_type));
  if (inf?.tax_id)          factsHtml += row('Tax ID', `<code>${esc(inf.tax_id)}</code>`);
  if (entity.roles?.length) factsHtml += row('Roles', entity.roles.map(esc).join(', '));
  if (cb?.acquired_by) {
    const v = cb.acquired_by_url
      ? `<a href="${esc(cb.acquired_by_url)}" target="_blank">${esc(cb.acquired_by)} ↗</a>`
      : esc(cb.acquired_by);
    factsHtml += row('Acquired by', v);
  }
  document.getElementById('ep-facts-body').innerHTML =
    factsHtml || `<div class="ep-na">No key facts recorded.</div>`;

  /* Full description (if different from short) */
  const fullDesc = cb?.description_full;
  const aboutCard = document.getElementById('ep-about-card');
  const aboutBody = document.getElementById('ep-about-body');
  if (fullDesc && fullDesc !== shortDesc) {
    aboutBody.innerHTML = `<p style="font-size:var(--fs-body);color:var(--text-secondary);line-height:var(--lh-body);margin:0">${esc(fullDesc)}</p>`;
    aboutCard.style.display = '';
  } else {
    aboutCard.style.display = 'none';
  }

  /* Founders */
  const foundersCard = document.getElementById('ep-founders-card');
  const foundersBody = document.getElementById('ep-founders-body');
  if (cb?.founders?.length) {
    foundersBody.innerHTML = `<div class="ep-founders">${cb.founders.map(f=>`<span class="ep-founder">${esc(f)}</span>`).join('')}</div>`;
    foundersCard.style.display = '';
  } else {
    foundersCard.style.display = 'none';
  }

  /* Industries & focus */
  const indCard = document.getElementById('ep-ind-card');
  const indBody = document.getElementById('ep-ind-body');
  let indHtml = '';
  if (inf?.main_focus)
    indHtml += `<p style="font-size:var(--fs-body);color:var(--text-secondary);line-height:var(--lh-body);margin:0 0 14px">${esc(inf.main_focus)}</p>`;
  if (cb?.primary_industry)   indHtml += row('Primary', esc(cb.primary_industry));
  if (cb?.industries?.length)
    indHtml += `<div class="ep-row"><span class="ep-row-lbl">Industries</span><span class="ep-row-val"><div class="ep-tags" style="margin-top:4px">${cb.industries.map(i=>`<span class="ep-tag">${esc(i)}</span>`).join('')}</div></span></div>`;
  if (cb?.industry_groups?.length)
    indHtml += `<div class="ep-row" style="border-bottom:none"><span class="ep-row-lbl">Groups</span><span class="ep-row-val"><div class="ep-tags" style="margin-top:4px">${cb.industry_groups.map(g=>`<span class="ep-tag">${esc(g)}</span>`).join('')}</div></span></div>`;
  if (indHtml) {
    indBody.innerHTML = indHtml;
    indCard.style.display = '';
  } else {
    indCard.style.display = 'none';
  }

  /* Relationships */
  const relCard  = document.getElementById('ep-rel-card');
  const relHdrLbl   = document.getElementById('ep-rel-hdr-lbl');
  const relHdrCount = document.getElementById('ep-rel-hdr-count');
  const relBody     = document.getElementById('ep-rel-body');
  let relHtml = '';
  let relTotal = 0;

  if (isCompany && asTarget.length) {
    relTotal += asTarget.length;
    if (isDual && asInvestor.length) {
      relHtml += `<div class="ep-rel-group-lbl">Investors (${asTarget.length})</div>`;
    }
    relHtml += `<ul class="ep-elist">` + asTarget.map(r => {
      const lead = r.rel.details?.lead;
      const badge = r.other ? typeBadge(r.other.type) : '';
      const name  = r.other ? esc(r.other.name) : esc(r.rel.source);
      return `<li>${badge}<span class="ep-elist-name">${name}</span>${lead ? '<span class="badge-lead">LEAD</span>' : ''}</li>`;
    }).join('') + `</ul>`;
  }

  if (asInvestor.length) {
    relTotal += asInvestor.length;
    if (isCompany && asTarget.length) {
      relHtml += `<div class="ep-rel-group-lbl" style="margin-top:8px">Portfolio (${asInvestor.length})</div>`;
    }
    relHtml += `<ul class="ep-elist">` + asInvestor.map(r => {
      const lead = r.rel.details?.lead;
      const badge = r.other ? sectorBadge(r.other.sector) || typeBadge(r.other.type) : '';
      const name  = r.other ? esc(r.other.name) : esc(r.rel.target);
      const country = r.other ? (r.other.sources?.infonodes?.country || r.other.sources?.wikidata?.country || '') : '';
      return `<li>${badge}<span class="ep-elist-name">${name}</span>${country ? `<span style="font-size:var(--fs-xs);color:var(--dim)">${esc(country)}</span>` : ''}${lead ? '<span class="badge-lead">LEAD</span>' : ''}</li>`;
    }).join('') + `</ul>`;
  }

  if (!relHtml) {
    relHdrLbl.textContent = 'Connections';
    relHdrCount.textContent = '';
    relBody.innerHTML = `<div class="ep-na">No investment relationships recorded.</div>`;
  } else {
    const bothRoles = isCompany && asTarget.length && asInvestor.length;
    relHdrLbl.textContent = bothRoles ? 'Investors & Portfolio' : (asTarget.length ? `Investors` : `Portfolio`);
    relHdrCount.textContent = relTotal;
    relBody.innerHTML = relHtml;
  }

  /* History */
  const histCard  = document.getElementById('ep-hist-card');
  const histList  = document.getElementById('ep-hist-list');
  const histCount = document.getElementById('ep-hist-count');
  if (entity.history?.length) {
    const entries = [...entity.history].reverse().slice(0, 25);
    histList.innerHTML = entries.map(h => {
      const desc = h.description || (
        h.field && h.field !== '*'
          ? `Updated ${h.field}: ${h.old ?? 'null'} → ${h.new ?? 'null'}`
          : 'Record created'
      );
      const meta = [h.field && h.field !== '*' ? h.field : null, h.source, h.author]
        .filter(Boolean).join(' · ');
      return `<li class="ep-hist-item">
        <div class="ep-hist-date">${esc(h.date||'')}</div>
        <div>
          <div class="ep-hist-desc">${esc(desc)}</div>
          ${meta ? `<div class="ep-hist-meta">${esc(meta)}</div>` : ''}
        </div>
      </li>`;
    }).join('');
    histCount.textContent = entity.history.length > 25 ? `${entries.length} of ${entity.history.length}` : entity.history.length;
    histCard.style.display = '';
  } else {
    histCard.style.display = 'none';
  }

  /* Crunchbase block */
  const cbBlock = document.getElementById('ep-cb-block');
  const cbBody  = document.getElementById('ep-cb-body');
  if (cb) {
    let cbHtml = '';
    if (cb.total_funding_usd) {
      cbHtml += row('Funding (USD)', `<strong style="color:var(--accent)">${fmtFunding(cb.total_funding_usd)}</strong>`);
    }
    if (cb.total_funding_native?.amount && cb.total_funding_native.currency !== 'USD')
      cbHtml += row(`Funding (${esc(cb.total_funding_native.currency)})`, Number(cb.total_funding_native.amount).toLocaleString());
    if (cb.revenue_range)  cbHtml += row('Revenue', esc(cb.revenue_range));
    if (cb.cb_rank)        cbHtml += row('CB Rank', `#${cb.cb_rank}`);
    if (cb.stage)          cbHtml += row('Stage', esc(cb.stage));
    if (cb.patents_granted != null && cb.patents_granted !== '')
      cbHtml += row('Patents', String(cb.patents_granted));
    if (cb.extracted_at)   cbHtml += `<div class="ep-src-ts">extracted ${esc(cb.extracted_at)}</div>`;
    cbBody.innerHTML = cbHtml || `<div class="ep-na">Crunchbase data available but no enriched fields.</div>`;
    cbBlock.style.display = '';
  } else {
    cbBody.innerHTML = `<div class="ep-na">No Crunchbase data.</div>`;
    cbBlock.style.display = '';
  }

  /* Wikidata block */
  const wdBlock = document.getElementById('ep-wd-block');
  const wdBody  = document.getElementById('ep-wd-body');
  if (wd) {
    let wdHtml = '';
    if (wd.description)
      wdHtml += `<div class="ep-src-desc">${esc(wd.description)}</div>`;
    if (wd.instance_of?.length)
      wdHtml += `<div class="ep-tags" style="margin-bottom:10px">${wd.instance_of.map(i=>`<span class="ep-tag">${esc(i)}</span>`).join('')}</div>`;
    if (wd.headquarters) wdHtml += row('HQ', esc(wd.headquarters));
    if (wd.employees)    wdHtml += row('Employees', Number(wd.employees).toLocaleString());
    if (wd.isin)         wdHtml += row('ISIN', `<code>${esc(wd.isin)}</code>`);
    if (wd.aliases?.length)
      wdHtml += `<div style="margin-top:8px" class="ep-tags">${wd.aliases.map(a=>`<span class="ep-tag">${esc(a)}</span>`).join('')}</div>`;
    if (wd.retrieved_at) wdHtml += `<div class="ep-src-ts">retrieved ${esc(wd.retrieved_at)}</div>`;
    wdBody.innerHTML = wdHtml || `<div class="ep-na">Wikidata record exists but has no enriched fields.</div>`;
    wdBlock.style.display = '';
  } else {
    wdBody.innerHTML = `<div class="ep-na">No Wikidata enrichment.</div>`;
    wdBlock.style.display = '';
  }

  /* Validation flags */
  const valCard  = document.getElementById('ep-val-card');
  const valBody  = document.getElementById('ep-val-body');
  const valCount = document.getElementById('ep-val-count');
  const openFlags = (entity.validation||[]).filter(v => v.status !== 'confirmed');
  if (openFlags.length) {
    valBody.innerHTML = openFlags.map(v =>
      `<div class="ep-val-item">
        <span class="ep-val-badge ${esc(v.status)}">${v.status==='flagged'?'⛔':'⚠'} ${esc(v.status)}</span>
        <span class="ep-val-desc">${esc(v.description||'')}</span>
      </div>`
    ).join('');
    valCount.textContent = openFlags.length;
    valCard.style.display = '';
  } else {
    valCard.style.display = 'none';
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Boot ──────────────────────────────────────────────────────────────── */
(async () => {
  await loadData();

  // Restore from URL
  const urlId = getUrlEntity();
  if (urlId && BY_ID[urlId]) {
    searchEl.value = BY_ID[urlId].name;
    document.getElementById('ep-hero').classList.add('compact');
    document.getElementById('ep-showing').textContent = BY_ID[urlId].name;
    document.getElementById('ep-back').classList.add('visible');
    renderProfile(BY_ID[urlId]);
  }

  searchEl.focus();
})();
</script>
</body>
</html>
