<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defense Tech · Investment Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #000000;
  --surface:  #0d0d0d;
  --border:   rgb(65,67,69);
  --text:     #ffffff;
  --dim:      rgba(255,255,255,0.42);
  --lead-c:   #68CCD1;
  --follow-c: rgba(255,255,255,0.58);
  --hl-row:   rgba(104,204,209,0.06);
  --font:     'Barlow Condensed', 'Inter', sans-serif;
}

body { background:var(--bg); color:var(--text); font-family:var(--font); overflow:hidden; }

/* ── HEADER ── */
#hdr {
  position:fixed; top:44px; left:0; right:0; height:50px;
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px; z-index:200;
}
#hdr h1 { font-size:17px; font-weight:700; color:#fff; letter-spacing:1.5px; text-transform:uppercase; }
#hdr .meta { font-size:12px; color:var(--dim); margin-left:4px; }
.sep { width:1px; height:20px; background:var(--border); }
.vbtn {
  padding:5px 16px; font-size:13px; border:1px solid var(--border);
  background:transparent; color:var(--dim); cursor:pointer; border-radius:50px;
  transition:all .15s; font-family:var(--font); font-weight:700; letter-spacing:.3px;
}
.vbtn.on { background:#68CCD1; color:#000000; border-color:#68CCD1; }
.vbtn:hover:not(.on) { background:var(--border); color:#fff; }

/* ── LEGEND PILLS ── */
.lpill {
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; color:var(--dim);
}
.ldot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.ml-auto { margin-left:auto; }

/* ── MAIN LAYOUT ── */
#app { position:fixed; top:94px; left:0; right:0; bottom:0; display:flex; }

/* ── MATRIX VIEW ── */
#matrix-view {
  flex:1; overflow:auto; padding:0;
  background:var(--bg);
}

table {
  border-collapse:collapse; min-width:100%;
  font-size:13px;
}

thead th {
  position:sticky; top:0; z-index:10;
  background:var(--surface);
  border-bottom:2px solid var(--border);
}

td:first-child, th:first-child {
  position:sticky; left:0; z-index:9;
  background:var(--surface);
}
thead th:first-child { z-index:11; }

.col-hdr {
  height:70px; vertical-align:bottom; padding-bottom:6px;
  font-weight:700; white-space:nowrap;
}
.col-hdr-inner {
  display:block;
  transform:rotate(-50deg) translateX(-8px);
  transform-origin:bottom left;
  color:var(--dim);
  font-size:11px;
  width:40px;
}
.col-hdr-inner:hover { color:var(--text); cursor:default; }
.col-hdr-inner abbr { text-decoration:none; }

tr:hover td { background:var(--hl-row); }
tr:hover td:first-child { background:rgba(104,204,209,0.08); }

.inv-cell {
  padding:3px 8px 3px 10px;
  white-space:nowrap;
  border-right:2px solid var(--border);
  min-width:180px;
  display:flex; align-items:center; gap:6px;
  cursor:pointer;
}
.inv-rank { font-size:10px; color:rgba(255,255,255,0.18); width:16px; text-align:right; flex-shrink:0; }
.inv-name { flex:1; color:var(--text); font-size:13px; overflow:hidden; text-overflow:ellipsis; }
.inv-name:hover { color:#fff; }
.count-pill {
  flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  width:20px; height:16px; border-radius:50px;
  font-size:11px; font-weight:700;
  background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.28);
}
.count-pill.c1 { background:rgba(104,204,209,0.14); color:#68CCD1; }
.count-pill.c2 { background:rgba(104,204,209,0.24); color:#68CCD1; }
.count-pill.c3 { background:rgba(104,204,209,0.38); color:#68CCD1; }
.count-lead { font-size:10px; color:#68CCD1; margin-left:1px; opacity:.75; }

.inv-td { width:28px; text-align:center; padding:2px 1px; border-right:1px solid rgba(65,67,69,0.4); }

.dot-lead {
  display:inline-block; width:14px; height:14px; border-radius:2px;
  background:#68CCD1;
  border:1px solid rgba(104,204,209,0.4);
  cursor:pointer; transition:transform .1s; position:relative;
}
.dot-lead::after {
  content:'L';
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:7px; font-weight:700; color:rgba(0,0,0,0.85);
}
.dot-lead:hover { transform:scale(1.3); }

.dot-follow {
  display:inline-block; width:14px; height:14px; border-radius:2px;
  background:rgba(255,255,255,0.52);
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; transition:transform .1s;
}
.dot-follow:hover { transform:scale(1.3); }

.dot-none { display:inline-block; width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.07); }

.bar-cell { padding:2px 8px; white-space:nowrap; border-left:2px solid var(--border); }
.bar-track { width:60px; height:4px; background:rgba(255,255,255,0.07); border-radius:2px; display:inline-block; vertical-align:middle; }
.bar-fill { height:100%; border-radius:2px; }

/* ── GRAPH VIEW ── */
#graph-view { flex:1; display:none; position:relative; }
#graph-svg { width:100%; height:100%; }

/* ── TOOLTIP ── */
#tip {
  position:fixed; background:#000; border:1px solid var(--border);
  padding:10px 14px; font-size:12px; pointer-events:none;
  display:none; z-index:400; border-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,.9);
  max-width:260px; line-height:1.5;
}
#tip .tname { color:#68CCD1; font-weight:700; font-size:14px; margin-bottom:4px; }
#tip .tinfo { color:var(--dim); }
#tip .thigh { color:rgba(255,255,255,0.3); margin-top:3px; font-size:11px; }

/* ── DETAIL PANEL ── */
#detail {
  width:260px; flex-shrink:0;
  background:var(--surface); border-left:1px solid var(--border);
  overflow-y:auto; padding:16px; display:none;
}
#detail.open { display:block; }
.dp-close {
  float:right; background:none; border:none; color:var(--dim);
  font-size:16px; cursor:pointer; padding:0 2px; line-height:1;
}
.dp-close:hover { color:var(--text); }
.dp-title { font-size:15px; color:#fff; font-weight:700; margin-bottom:4px; padding-right:20px; line-height:1.3; text-transform:uppercase; letter-spacing:.5px; }
.dp-badge {
  display:inline-block; font-size:10px; padding:2px 10px; border-radius:50px;
  letter-spacing:.5px; margin-bottom:12px; font-weight:700;
}
.db-inv  { background:rgba(104,204,209,0.12); color:#68CCD1; border:1px solid rgba(104,204,209,0.3); }
.db-start { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.65); border:1px solid rgba(255,255,255,0.15); }
.dp-label { font-size:10px; color:#68CCD1; letter-spacing:1px; text-transform:uppercase; margin:12px 0 6px; font-weight:700; }
.dp-list { list-style:none; }
.dp-list li {
  font-size:12px; padding:4px 0; border-bottom:1px solid rgba(65,67,69,0.5);
  color:var(--dim); display:flex; align-items:center; justify-content:space-between; gap:6px;
}
.dp-list li span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lead-tag { font-size:9px; padding:1px 6px; background:rgba(104,204,209,0.12); color:#68CCD1; border:1px solid rgba(104,204,209,0.3); flex-shrink:0; border-radius:50px; font-weight:700; }

/* ── D3 GRAPH ── */
.gnode-inv circle { fill:#000; stroke:#68CCD1; stroke-width:1.8; cursor:pointer; }
.gnode-inv circle:hover { fill:#0a1818; }
.gnode-inv.ghl circle { fill:#0a1818; filter:drop-shadow(0 0 6px #68CCD1); }
.gnode-start circle { fill:#000; stroke:rgba(255,255,255,0.48); stroke-width:1.3; cursor:pointer; }
.gnode-start circle:hover { fill:#111; }
.gnode-start.ghl circle { fill:#111; filter:drop-shadow(0 0 5px rgba(255,255,255,0.7)); }
.glabel { font-family:var(--font); font-size:10px; fill:rgba(255,255,255,0.35); pointer-events:none; }
.gbadge { font-family:var(--font); font-size:9px; fill:#68CCD1; font-weight:700; pointer-events:none; }
.glink { stroke:var(--border); stroke-opacity:.6; }
.glink.lead { stroke:rgba(104,204,209,0.55); }
.glink.ghl  { stroke:#68CCD1; stroke-opacity:1; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:#000; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#68CCD1; }

/* ── info.nodes global nav ── */
#in-nav {
  position:fixed; top:0; left:0; right:0; height:44px; z-index:9999;
  background:#000; border-bottom:1px solid rgb(65,67,69);
  display:flex; align-items:center; padding:0 24px; gap:24px;
}
.in-brand {
  font-size:1.5rem; font-weight:700; color:#fff; text-decoration:none;
  letter-spacing:1px; text-transform:uppercase; flex-shrink:0;
}
.in-brand span { color:#68CCD1; }
.in-links { display:flex; gap:4px; margin-left:auto; }
.in-link {
  font-size:1.3rem; font-weight:700; color:rgba(255,255,255,0.45);
  text-decoration:none; padding:5px 16px; border-radius:50px;
  border:1px solid transparent; transition:all .15s; letter-spacing:.3px;
}
.in-link:hover { color:#fff; border-color:rgb(65,67,69); background:rgba(255,255,255,0.05); }
.in-link.active { color:#000; background:#68CCD1; border-color:#68CCD1; }
</style>
</head>
<body>

<nav id="in-nav">
  <a href="../../" class="in-brand">info<span>.</span>nodes</a>
  <div class="in-links">
    <a href="./"                               class="in-link active">Startup Map</a>
    <a href="../../crunchbase_full/"           class="in-link">Investment Map</a>
    <a href="../../wikidata_inspector/"        class="in-link">Wikidata</a>
    <a href="../../call-checker_infonodes/"    class="in-link">CallChecker</a>
  </div>
</nav>

<!-- HEADER -->
<div id="hdr">
  <h1>Investment Map</h1>
  <span class="meta">18 startups · defense tech · EU/NATO</span>
  <div class="sep"></div>
  <button class="vbtn on" id="btn-mx"    onclick="setView('matrix')">Matrix</button>
  <button class="vbtn"    id="btn-bi"    onclick="setView('bipartite')">Bipartite</button>
  <button class="vbtn"    id="btn-graph" onclick="setView('graph')">Network</button>
  <button class="vbtn"    id="btn-proj"  onclick="setView('projection')">Projection</button>
  <div class="sep"></div>
  <span class="lpill"><span class="ldot" style="background:#68CCD1"></span>Lead investment</span>
  <span class="lpill"><span class="ldot" style="background:rgba(255,255,255,0.52)"></span>Follow investment</span>
  <div class="ml-auto" style="font-size:13px;color:var(--dim)" id="hdr-info"></div>
</div>

<!-- APP -->
<div id="app">
  <div id="matrix-view"></div>
  <div id="bi-view" style="flex:1;display:none;"><svg id="bi-svg" style="width:100%;height:100%;"></svg></div>
  <div id="graph-view"><svg id="graph-svg"></svg></div>
  <div id="proj-view" style="flex:1;display:none;position:relative;">
    <div id="proj-filter" style="position:absolute;top:12px;left:14px;z-index:10;display:flex;gap:6px;">
      <button class="vbtn on" id="pf-all"   onclick="setProjFilter('all')">All edges</button>
      <button class="vbtn"    id="pf-multi" onclick="setProjFilter('multi')">Co-invest ≥2</button>
    </div>
    <svg id="proj-svg" style="width:100%;height:100%;"></svg>
  </div>
  <div id="detail">
    <button class="dp-close" onclick="closeDetail()">×</button>
    <div id="dp-inner"></div>
  </div>
</div>

<div id="tip">
  <div class="tname" id="tn"></div>
  <div class="tinfo" id="ti"></div>
  <div class="thigh" id="th"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════

const STARTUPS = [
  { id:"Helsing",                  loc:"Munich, DE",       ind:"AI · Drones · Military" },
  { id:"Quantum Systems",          loc:"Gilching, DE",     ind:"Aerospace · AI · Drones" },
  { id:"TEKEVER",                  loc:"Lisboa, PT",       ind:"Aerospace · Military" },
  { id:"ICEYE",                    loc:"Espoo, FI",        ind:"SAR Satellites" },
  { id:"Origin Robotics",          loc:"Riga, LV",        ind:"Military Robotics" },
  { id:"ARX Robotics",             loc:"München, DE",     ind:"Autonomous Ground Systems" },
  { id:"Roark Aerospace",          loc:"London, UK",      ind:"Counter-UAS" },
  { id:"Destinus",                 loc:"Katwijk, NL",     ind:"Hypersonic Aerospace" },
  { id:"Delian",                   loc:"London, UK",      ind:"AI · National Security" },
  { id:"Arondite",                 loc:"London, UK",      ind:"Autonomous Systems SW" },
  { id:"Nordic Air Defence",       loc:"Segeltorp, SE",   ind:"Air Defence" },
  { id:"Alpine Eagle",             loc:"Munich, DE",      ind:"Defense Software" },
  { id:"Comand AI",                loc:"Montréal, CA",    ind:"AI · Command & Control" },
  { id:"Alta Ares",                loc:"Romainville, FR", ind:"Drone Surveillance" },
  { id:"Intelic",                  loc:"Amsterdam, NL",   ind:"C2 · Unmanned Systems" },
  { id:"XRF.ai",                   loc:"Telde, ES",       ind:"Decision Intelligence" },
  { id:"Unmanned Defense Systems", loc:"Vilnius, LT",     ind:"Military UAV" },
  { id:"C2Grid",                   loc:"Tallinn, EE",     ind:"AI · Situational Awareness" },
];

// [startup, investor, isLead]
const RAW = [
  ["Helsing","General Catalyst",true],
  ["Helsing","Lightspeed Venture Partners",false],
  ["Helsing","Accel",false],
  ["Helsing","BDT & MSD Partners",false],
  ["Helsing","Greenoaks",false],

  ["Quantum Systems","European Investment Bank",true],
  ["Quantum Systems","Balderton Capital",true],
  ["Quantum Systems","Deutsche Bank",false],
  ["Quantum Systems","Notion Capital",false],
  ["Quantum Systems","KfW",false],

  ["TEKEVER","Baillie Gifford",true],
  ["TEKEVER","Iberis Capital",false],
  ["TEKEVER","National Security Strategic Investment Fund",false],
  ["TEKEVER","NATO Innovation Fund",true],
  ["TEKEVER","Crescent Cove Advisors",false],

  ["ICEYE","General Catalyst",true],
  ["ICEYE","Bpifrance",false],
  ["ICEYE","BlackRock",false],
  ["ICEYE","Draper Associates",false],
  ["ICEYE","European Investment Fund",false],

  ["Origin Robotics","Change Ventures",true],
  ["Origin Robotics","European Union",true],
  ["Origin Robotics","Silicon Roundabout Ventures",false],

  ["ARX Robotics","Speedinvest",true],
  ["ARX Robotics","HV Capital",true],
  ["ARX Robotics","Robin Capital",false],
  ["ARX Robotics","Omnes Capital",false],
  ["ARX Robotics","NATO Innovation Fund",true],

  ["Destinus","Commerzbank",true],
  ["Destinus","Soma Capital",false],
  ["Destinus","TA Ventures",false],

  ["Delian","Air Street Capital",true],
  ["Delian","Marathon Venture Capital",true],
  ["Delian","Nebular",false],
  ["Delian","HCVC",false],
  ["Delian","Entropy Industrial Capital",false],

  ["Arondite","Index Ventures",true],
  ["Arondite","Concept Ventures",true],
  ["Arondite","Creator Fund",true],
  ["Arondite","Chris Adelsbach",false],

  ["Nordic Air Defence","Inflection",true],
  ["Nordic Air Defence","SNÖ Ventures",true],
  ["Nordic Air Defence","EUDIS Business Accelerator",true],
  ["Nordic Air Defence","Noam Perski",false],
  ["Nordic Air Defence","Gustav Wiberg",false],

  ["Alpine Eagle","General Catalyst",false],
  ["Alpine Eagle","HTGF",false],
  ["Alpine Eagle","HCVC",false],
  ["Alpine Eagle","IQ Capital",true],
  ["Alpine Eagle","Expeditions",false],

  ["Comand AI","Expeditions",false],
  ["Comand AI","Kima Ventures",false],
  ["Comand AI","Frst",true],
  ["Comand AI","Eurazeo",true],
  ["Comand AI","Shape VC",false],

  ["Alta Ares","Bpifrance",false],
  ["Alta Ares","Kima Ventures",false],
  ["Alta Ares","Starburst Accelerator",false],
  ["Alta Ares","Apeiron Venture Capital",false],
  ["Alta Ares","Better Angle",false],

  ["Intelic","Keen Venture Partners",true],

  ["XRF.ai","K Fund",false],
  ["XRF.ai","GoHub Ventures",false],
  ["XRF.ai","JME Ventures",false],
  ["XRF.ai","EUDIS Business Accelerator",true],

  ["Unmanned Defense Systems","Coinvest Capital",true],
  ["Unmanned Defense Systems","Gytenis Galkis",false],
  ["Unmanned Defense Systems","Rita Sakus",false],
  ["Unmanned Defense Systems","Vladas Lašas",false],
  ["Unmanned Defense Systems","Martynas Kandzeras",false],

  ["C2Grid","BSV Ventures",false],
  ["C2Grid","Sunfish Partners",true],
  ["C2Grid","Mike Oliinyk",false],
];

// ── Build index structures ──
// investor → { portfolio: [{startup, lead}], total, leads }
const invMap = {};
RAW.forEach(([s,i,lead]) => {
  if (!invMap[i]) invMap[i] = { id:i, portfolio:[], total:0, leads:0 };
  invMap[i].portfolio.push({ startup:s, lead });
  invMap[i].total++;
  if (lead) invMap[i].leads++;
});

// startup → { investors: [{investor, lead}] }
const startMap = {};
STARTUPS.forEach(s => startMap[s.id] = { ...s, investors:[], leads:[] });
RAW.forEach(([s,i,lead]) => {
  startMap[s].investors.push({ investor:i, lead });
  if (lead) startMap[s].leads.push(i);
});

// Sorted investors: most portfolio companies first
const INVESTORS = Object.values(invMap)
  .sort((a,b) => b.total - a.total || b.leads - a.leads);

document.getElementById("hdr-info").textContent =
  `${INVESTORS.length} investors · ${RAW.length} investments · ${RAW.filter(d=>d[2]).length} lead`;

// ══════════════════════════════════════════════════════
//  MATRIX VIEW
// ══════════════════════════════════════════════════════

function buildMatrix() {
  const container = document.getElementById("matrix-view");
  const maxTotal = INVESTORS[0].total;

  let html = `<table>`;

  // ── THEAD ──
  html += `<thead><tr>`;
  html += `<th style="min-width:220px;padding:0 12px;text-align:left;vertical-align:bottom;padding-bottom:10px">
    <span style="font-size:10px;color:var(--dim);letter-spacing:.5px">INVESTOR</span>
    <span style="font-size:9px;color:#1f3040;margin-left:6px"># = portfolio count</span>
  </th>`;

  STARTUPS.forEach(s => {
    const short = s.id.length > 14 ? s.id.slice(0,13)+"…" : s.id;
    html += `<th class="col-hdr">
      <span class="col-hdr-inner"><abbr title="${s.id} · ${s.loc} · ${s.ind}">${short}</abbr></span>
    </th>`;
  });

  html += `<th style="min-width:100px;padding:0 12px;vertical-align:bottom;padding-bottom:10px;border-left:2px solid var(--border)">
    <span style="font-size:10px;color:var(--dim)">TOTAL</span>
  </th>`;
  html += `</tr></thead>`;

  // ── TBODY ──
  html += `<tbody>`;
  INVESTORS.forEach((inv, idx) => {
    // Build lookup for this investor's portfolio
    const pf = {};
    inv.portfolio.forEach(p => pf[p.startup] = p.lead);

    // Count class for pill
    const cc = inv.total >= 3 ? "c3" : inv.total === 2 ? "c2" : inv.total === 1 ? "c1" : "";
    const leadLabel = inv.leads > 0
      ? `<span class="count-lead" title="${inv.leads} lead investment${inv.leads>1?'s':''}">↑${inv.leads}</span>`
      : "";

    html += `<tr>`;
    // Investor name cell
    html += `<td>
      <div class="inv-cell" onclick="showInvestorDetail('${inv.id.replace(/'/g,"\\'")}')">
        <span class="inv-rank">${idx+1}</span>
        <span class="inv-name">${inv.id}</span>
        ${leadLabel}
        <span class="count-pill ${cc}" title="${inv.total} investment${inv.total>1?'s':''}">${inv.total}</span>
      </div>
    </td>`;

    // One cell per startup
    STARTUPS.forEach(s => {
      if (s.id in pf) {
        const isLead = pf[s.id];
        const cls = isLead ? "dot-lead" : "dot-follow";
        const title = `${inv.id} → ${s.id} (${isLead ? "LEAD" : "follow"})`;
        html += `<td class="inv-td">
          <span class="${cls}" title="${title}"
            onmouseenter="showTip(event,'${inv.id.replace(/'/g,"\\'")}','${s.id.replace(/'/g,"\\'")}',${isLead})"
            onmouseleave="hideTip()"
          ></span>
        </td>`;
      } else {
        html += `<td class="inv-td"><span class="dot-none"></span></td>`;
      }
    });

    // Total bar
    const pct = (inv.total / maxTotal * 100).toFixed(0);
    const barColor = inv.total >= 3
      ? "#68CCD1"
      : inv.total === 2
        ? "rgba(104,204,209,0.6)"
        : "rgba(255,255,255,0.4)";
    html += `<td class="bar-cell">
      <span class="bar-track"><span class="bar-fill" style="width:${pct}%;background:${barColor}"></span></span>
      <span style="font-size:10px;color:${barColor};margin-left:6px;font-weight:600">${inv.total}</span>
    </td>`;

    html += `</tr>`;
  });
  html += `</tbody></table>`;

  container.innerHTML = html;
}

// ══════════════════════════════════════════════════════
//  DETAIL PANEL
// ══════════════════════════════════════════════════════

function showInvestorDetail(id) {
  const inv = invMap[id];
  if (!inv) return;
  const det = document.getElementById("detail");
  const inner = document.getElementById("dp-inner");

  let html = `<div class="dp-title">${inv.id}</div>`;
  html += `<div class="dp-badge db-inv">INVESTOR</div>`;

  const total = inv.total, leads = inv.leads;
  html += `<div style="font-size:11px;color:var(--dim);margin-bottom:4px">${total} investment${total>1?'s':''}</div>`;
  html += `<div style="font-size:11px;color:var(--lead-c);margin-bottom:12px">${leads} lead investment${leads!==1?'s':''}</div>`;

  html += `<div class="dp-label">Portfolio</div><ul class="dp-list">`;
  // Sort: leads first
  const sorted = [...inv.portfolio].sort((a,b) => (b.lead?1:0)-(a.lead?1:0));
  sorted.forEach(p => {
    const s = startMap[p.startup];
    html += `<li>
      <span>${p.startup}</span>
      ${p.lead ? '<span class="lead-tag">LEAD</span>' : ''}
    </li>`;
  });
  html += `</ul>`;

  // Co-investors
  const coSet = {};
  inv.portfolio.forEach(p => {
    const others = startMap[p.startup].investors.filter(x => x.investor !== id);
    others.forEach(o => {
      if (!coSet[o.investor]) coSet[o.investor] = 0;
      coSet[o.investor]++;
    });
  });
  const coList = Object.entries(coSet).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if (coList.length) {
    html += `<div class="dp-label">Co-investors</div><ul class="dp-list">`;
    coList.forEach(([name, count]) => {
      html += `<li><span>${name}</span><span style="color:var(--dim);font-size:10px">${count > 1 ? count + "×" : ""}</span></li>`;
    });
    html += `</ul>`;
  }

  inner.innerHTML = html;
  det.classList.add("open");
}

function showStartupDetail(id) {
  const s = startMap[id];
  if (!s) return;
  const det = document.getElementById("detail");
  const inner = document.getElementById("dp-inner");

  let html = `<div class="dp-title">${s.id}</div>`;
  html += `<div class="dp-badge db-start">STARTUP</div>`;
  html += `<div style="font-size:11px;color:var(--dim);margin-bottom:2px">${s.loc}</div>`;
  html += `<div style="font-size:11px;color:var(--dim);margin-bottom:12px">${s.ind}</div>`;

  html += `<div class="dp-label">Investors (${s.investors.length})</div><ul class="dp-list">`;
  const sorted = [...s.investors].sort((a,b)=>(b.lead?1:0)-(a.lead?1:0));
  sorted.forEach(x => {
    html += `<li><span>${x.investor}</span>${x.lead?'<span class="lead-tag">LEAD</span>':''}</li>`;
  });
  html += `</ul>`;

  inner.innerHTML = html;
  det.classList.add("open");
}

function closeDetail() {
  document.getElementById("detail").classList.remove("open");
}

function showTip(e, investor, startup, isLead) {
  const t = document.getElementById("tip");
  document.getElementById("tn").textContent = investor + " → " + startup;
  document.getElementById("ti").textContent = isLead ? "Lead investment" : "Follow investment";
  const s = startMap[startup];
  document.getElementById("th").textContent = s ? s.ind + " · " + s.loc : "";
  t.style.display = "block";
  t.style.left = (e.clientX + 14) + "px";
  t.style.top  = (e.clientY - 8) + "px";
}

function hideTip() {
  document.getElementById("tip").style.display = "none";
}

// ══════════════════════════════════════════════════════
//  NETWORK GRAPH VIEW  (investor-centric bipartite)
// ══════════════════════════════════════════════════════

let sim;

function buildGraph() {
  const svg = d3.select("#graph-svg");
  svg.selectAll("*").remove();

  const W = document.getElementById("graph-view").clientWidth;
  const H = document.getElementById("graph-view").clientHeight;
  const cx = W / 2, cy = H / 2;

  // Startups: inner ring — investors: outer ring
  const R_start = Math.min(W, H) * 0.16;
  const R_inv   = Math.min(W, H) * 0.42;

  const g = svg.append("g");
  const zoom = d3.zoom().scaleExtent([0.1,4])
    .on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoom);

  // Initial positions on rings so the animation starts tidy
  const startNodes = STARTUPS.map((s, i) => {
    const a = (i / STARTUPS.length) * 2 * Math.PI;
    return {
      ...startMap[s.id], type:"startup",
      x: cx + R_start * Math.cos(a),
      y: cy + R_start * Math.sin(a),
    };
  });
  const invNodes = INVESTORS.map((inv, i) => {
    const a = (i / INVESTORS.length) * 2 * Math.PI;
    return {
      ...inv, type:"investor",
      x: cx + R_inv * Math.cos(a),
      y: cy + R_inv * Math.sin(a),
    };
  });

  const nodes = [...startNodes, ...invNodes];
  const links = RAW.map(([s,i,lead]) => ({ source:i, target:s, lead }));

  const lkG = g.append("g");
  const ndG = g.append("g");

  const lk = lkG.selectAll("line").data(links).join("line")
    .attr("class", d => `glink${d.lead?" lead":""}`)
    .attr("stroke-width", d => d.lead ? 1.4 : 0.7);

  function rInv(d)   { return 5 + Math.sqrt(d.total||1) * 4; }
  function rStart(d) { return 4 + Math.sqrt((d.investors||[]).length) * 2; }
  function r(d)      { return d.type==="investor" ? rInv(d) : rStart(d); }

  const nd = ndG.selectAll("g").data(nodes, d=>d.id).join("g")
    .attr("class", d => `gnode-${d.type==="investor"?"inv":"start"}`)
    .call(d3.drag()
      .on("start", (e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",  (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",   (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on("click", (e,d) => {
      e.stopPropagation();
      if (d.type==="investor") showInvestorDetail(d.id);
      else showStartupDetail(d.id);
      highlightNode(d.id, nd, lk);
    })
    .on("mouseover", (e,d) => {
      const t = document.getElementById("tip");
      document.getElementById("tn").textContent = d.id;
      if (d.type==="investor") {
        document.getElementById("ti").textContent = `${d.total} investments · ${d.leads} lead`;
        document.getElementById("th").textContent = d.portfolio.map(p=>p.startup).join(" · ");
      } else {
        document.getElementById("ti").textContent = `${(d.investors||[]).length} investors · ${d.loc}`;
        document.getElementById("th").textContent = d.ind;
      }
      t.style.display = "block";
      t.style.left = (e.clientX+14)+"px";
      t.style.top  = (e.clientY-8)+"px";
    })
    .on("mouseout", hideTip);

  nd.append("circle").attr("r", r);

  nd.append("text")
    .attr("class","glabel")
    .attr("dy", d => r(d)+11)
    .attr("text-anchor","middle")
    .text(d => d.id.length>16 ? d.id.slice(0,15)+"…" : d.id);

  nd.filter(d => d.type==="investor" && d.total > 1)
    .append("text")
    .attr("class","gbadge")
    .attr("dy",3).attr("text-anchor","middle")
    .text(d => d.total);

  if (sim) sim.stop();
  sim = d3.forceSimulation(nodes)
    // link distance 184 = +15% vs baseline 160; inter-cluster separation via charge
    .force("link",   d3.forceLink(links).id(d=>d.id).distance(184).strength(0.35))
    .force("charge", d3.forceManyBody().strength(d => d.type==="investor" ? -92 : -46))
    // radial: startups pulled inward, investors pulled to outer ring
    .force("radial", d3.forceRadial(
      d => d.type==="startup" ? R_start : R_inv, cx, cy
    ).strength(d => d.type==="startup" ? 0.45 : 0.22))
    .force("col",    d3.forceCollide(d => r(d)+6))
    .on("tick", () => {
      lk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      nd.attr("transform",d=>`translate(${d.x},${d.y})`);
    });

  svg.on("click", () => {
    nd.classed("ghl",false);
    lkG.selectAll("line").attr("stroke-opacity",null).classed("ghl",false);
    ndG.selectAll("circle").attr("opacity",null);
    ndG.selectAll("text").attr("opacity",null);
  });
}

function highlightNode(id, nd, lk) {
  const connected = new Set([id]);
  RAW.forEach(([s,i]) => {
    if (s===id || i===id) { connected.add(s); connected.add(i); }
  });

  nd.classed("ghl", d => connected.has(d.id));
  lk.classed("ghl", l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    return s===id || t===id;
  });
  const parent = nd.node()?.parentNode;
  d3.select(parent).selectAll("g:not(.ghl) circle").attr("opacity",0.15);
  d3.select(parent).selectAll("g:not(.ghl) text").attr("opacity",0.15);
  lk.filter(l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    return s!==id && t!==id;
  }).attr("stroke-opacity",0.05);
}

// ══════════════════════════════════════════════════════
//  PROJECTION (investor co-investment graph)
// ══════════════════════════════════════════════════════

// Build co-investment index
const coMap = {};
INVESTORS.forEach(inv => {
  inv.portfolio.forEach(p => {
    const others = RAW.filter(d => d[0]===p.startup && d[1]!==inv.id).map(d=>d[1]);
    others.forEach(other => {
      const key = [inv.id, other].sort().join("|||");
      if (!coMap[key]) coMap[key] = { a:[inv.id,other].sort()[0], b:[inv.id,other].sort()[1], startups:[] };
      if (!coMap[key].startups.includes(p.startup)) coMap[key].startups.push(p.startup);
    });
  });
});
const CO_LINKS = Object.values(coMap);

let projFilter = "all";
let simProj;

function setProjFilter(f) {
  projFilter = f;
  document.getElementById("pf-all").classList.toggle("on",   f==="all");
  document.getElementById("pf-multi").classList.toggle("on", f==="multi");
  buildProjection(f);
}

function buildProjection(filter="all") {
  if (simProj) simProj.stop();
  const svg = d3.select("#proj-svg");
  svg.selectAll("*").remove();

  const W = document.getElementById("proj-view").clientWidth;
  const H = document.getElementById("proj-view").clientHeight;

  const g = svg.append("g");
  const zoom = d3.zoom().scaleExtent([0.1,5])
    .on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoom);

  const nodes = INVESTORS.map(inv => ({
    ...inv,
    x: W/2 + (Math.random()-.5)*300,
    y: H/2 + (Math.random()-.5)*300,
  }));

  let links = CO_LINKS.map(c => ({
    source:c.a, target:c.b,
    weight:c.startups.length,
    startups:c.startups
  }));
  if (filter==="multi") links = links.filter(l=>l.weight>1);

  const lkG = g.append("g");
  const ndG = g.append("g");

  const lk = lkG.selectAll("line").data(links).join("line")
    .attr("stroke", d => d.weight>1 ? "rgba(104,204,209,.55)" : "rgb(65,67,69)")
    .attr("stroke-width", d => 0.6 + d.weight*1.2)
    .attr("fill","none")
    .on("mouseover", (e,d) => {
      const s = d.source.id||d.source, t = d.target.id||d.target;
      document.getElementById("tn").textContent = `${s}  ×  ${t}`;
      document.getElementById("ti").textContent = `${d.weight} shared investment${d.weight>1?"s":""}`;
      document.getElementById("th").textContent = d.startups.join(" · ");
      const tip = document.getElementById("tip");
      tip.style.display = "block";
      tip.style.left = (e.clientX+14)+"px";
      tip.style.top  = (e.clientY-8)+"px";
    })
    .on("mouseout", hideTip);

  function rProj(d) { return 5 + Math.sqrt(d.total) * 4; }

  const nd = ndG.selectAll("g").data(nodes, d=>d.id).join("g")
    .attr("class","gnode-inv")
    .call(d3.drag()
      .on("start",(e,d)=>{ if(!e.active) simProj.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",  (e,d)=>{ if(!e.active) simProj.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on("click", (e,d) => {
      e.stopPropagation();
      showInvestorDetail(d.id);
      // highlight
      const connected = new Set([d.id]);
      lk.each(l => { const s=l.source.id||l.source, t=l.target.id||l.target; if(s===d.id||t===d.id){connected.add(s);connected.add(t);} });
      nd.classed("ghl", n => connected.has(n.id));
      lk.classed("ghl", l => { const s=l.source.id||l.source, t=l.target.id||l.target; return s===d.id||t===d.id; });
      ndG.selectAll("g:not(.ghl) circle").attr("opacity",0.18);
      ndG.selectAll("g:not(.ghl) text").attr("opacity",0.18);
      lkG.selectAll("line:not(.ghl)").attr("stroke-opacity",0.06);
    })
    .on("mouseover",(e,d) => {
      document.getElementById("tn").textContent = d.id;
      document.getElementById("ti").textContent = `${d.total} investment${d.total>1?"s":""} · ${d.leads} lead`;
      document.getElementById("th").textContent = d.portfolio.map(p=>p.startup).join(" · ");
      const tip = document.getElementById("tip");
      tip.style.display="block"; tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-8)+"px";
    })
    .on("mouseout", hideTip);

  nd.append("circle").attr("r", rProj);

  nd.append("text").attr("class","glabel")
    .attr("dy", d => rProj(d)+11).attr("text-anchor","middle")
    .text(d => d.id.length>16 ? d.id.slice(0,15)+"…" : d.id);

  nd.filter(d=>d.total>1)
    .append("text").attr("class","gbadge")
    .attr("dy",3).attr("text-anchor","middle")
    .text(d=>d.total);

  svg.on("click", () => {
    nd.classed("ghl",false);
    lk.classed("ghl",false);
    ndG.selectAll("circle").attr("opacity",null);
    ndG.selectAll("text").attr("opacity",null);
    lkG.selectAll("line").attr("stroke-opacity",null);
  });

  simProj = d3.forceSimulation(nodes)
    .force("link",   d3.forceLink(links).id(d=>d.id).distance(d=>60+50/Math.max(d.weight,1)).strength(0.25))
    .force("charge", d3.forceManyBody().strength(-120))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("col",    d3.forceCollide(d=>rProj(d)+8))
    .on("tick", () => {
      lk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      nd.attr("transform",d=>`translate(${d.x},${d.y})`);
    });
}

// ══════════════════════════════════════════════════════
//  BIPARTITE  (investors left · startups right)
// ══════════════════════════════════════════════════════

let simBi;

function buildBipartite() {
  if (simBi) simBi.stop();
  const svg = d3.select("#bi-svg");
  svg.selectAll("*").remove();

  const W = document.getElementById("bi-view").clientWidth;
  const H = document.getElementById("bi-view").clientHeight;

  const g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.1,4]).on("zoom", e => g.attr("transform", e.transform)));

  // investors sorted by portfolio size on the left, startups on the right
  const invNodes = INVESTORS.map((inv, i) => ({
    ...inv, type:"investor",
    x: W * 0.25, y: (H / (INVESTORS.length + 1)) * (i + 1),
    _x0: W * 0.25, _y0: (H / (INVESTORS.length + 1)) * (i + 1),
  }));
  const startNodes = STARTUPS.map((s, i) => ({
    ...startMap[s.id], type:"startup",
    x: W * 0.72, y: (H / (STARTUPS.length + 1)) * (i + 1),
    _x0: W * 0.72, _y0: (H / (STARTUPS.length + 1)) * (i + 1),
  }));

  const nodes = [...invNodes, ...startNodes];
  const links = RAW.map(([s,i,lead]) => ({ source:i, target:s, lead }));

  const lkG = g.append("g");
  const ndG = g.append("g");

  const lk = lkG.selectAll("line").data(links).join("line")
    .attr("class", d => `glink${d.lead?" lead":""}`)
    .attr("stroke-width", d => d.lead ? 1.4 : 0.7);

  function rInv(d)   { return 5 + Math.sqrt(d.total||1) * 4; }
  function rStart(d) { return 4 + Math.sqrt((d.investors||[]).length) * 2; }
  function r(d)      { return d.type==="investor" ? rInv(d) : rStart(d); }

  const nd = ndG.selectAll("g").data(nodes, d=>d.id).join("g")
    .attr("class", d => `gnode-${d.type==="investor"?"inv":"start"}`)
    .call(d3.drag()
      .on("start",(e,d)=>{ if(!e.active) simBi.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",  (e,d)=>{ if(!e.active) simBi.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on("click", (e,d) => {
      e.stopPropagation();
      if (d.type==="investor") showInvestorDetail(d.id);
      else showStartupDetail(d.id);
      // highlight
      const conn = new Set([d.id]);
      RAW.forEach(([s,i]) => { if(s===d.id||i===d.id){conn.add(s);conn.add(i);} });
      nd.classed("ghl", n => conn.has(n.id));
      lk.classed("ghl", l => { const s=l.source.id||l.source,t=l.target.id||l.target; return s===d.id||t===d.id; });
      ndG.selectAll("g:not(.ghl) circle").attr("opacity",0.15);
      ndG.selectAll("g:not(.ghl) text").attr("opacity",0.15);
      lkG.selectAll("line:not(.ghl)").attr("stroke-opacity",0.05);
    })
    .on("mouseover",(e,d)=>{
      document.getElementById("tn").textContent = d.id;
      if (d.type==="investor") {
        document.getElementById("ti").textContent=`${d.total} investments · ${d.leads} lead`;
        document.getElementById("th").textContent=d.portfolio.map(p=>p.startup).join(" · ");
      } else {
        document.getElementById("ti").textContent=`${(d.investors||[]).length} investors · ${d.loc}`;
        document.getElementById("th").textContent=d.ind;
      }
      const t=document.getElementById("tip");
      t.style.display="block"; t.style.left=(e.clientX+14)+"px"; t.style.top=(e.clientY-8)+"px";
    })
    .on("mouseout", hideTip);

  nd.append("circle").attr("r", r);
  nd.append("text").attr("class","glabel")
    .attr("dy", d => r(d)+11).attr("text-anchor","middle")
    .text(d => d.id.length>16 ? d.id.slice(0,15)+"…" : d.id);
  nd.filter(d=>d.type==="investor"&&d.total>1)
    .append("text").attr("class","gbadge")
    .attr("dy",3).attr("text-anchor","middle").text(d=>d.total);

  svg.on("click",()=>{
    nd.classed("ghl",false); lk.classed("ghl",false);
    ndG.selectAll("circle").attr("opacity",null); ndG.selectAll("text").attr("opacity",null);
    lkG.selectAll("line").attr("stroke-opacity",null);
  });

  simBi = d3.forceSimulation(nodes)
    .force("link",   d3.forceLink(links).id(d=>d.id).distance(140).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-55))
    .force("x",      d3.forceX(d=>d._x0).strength(0.22))
    .force("y",      d3.forceY(d=>d._y0).strength(0.06))
    .force("col",    d3.forceCollide(d=>r(d)+5))
    .on("tick",()=>{
      lk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      nd.attr("transform",d=>`translate(${d.x},${d.y})`);
    });
}

// ══════════════════════════════════════════════════════
//  VIEW TOGGLE
// ══════════════════════════════════════════════════════

let currentView = "matrix";

function setView(v) {
  currentView = v;
  ["mx","bi","graph","proj"].forEach(k =>
    document.getElementById(`btn-${k}`)?.classList.toggle("on", v===({mx:"matrix",bi:"bipartite",graph:"graph",proj:"projection"}[k]))
  );
  document.getElementById("matrix-view").style.display = v==="matrix"     ? "block" : "none";
  document.getElementById("bi-view").style.display     = v==="bipartite"  ? "block" : "none";
  document.getElementById("graph-view").style.display  = v==="graph"      ? "block" : "none";
  document.getElementById("proj-view").style.display   = v==="projection" ? "block" : "none";
  if (v==="bipartite")  buildBipartite();
  if (v==="graph")      buildGraph();
  if (v==="projection") buildProjection(projFilter);
}
