<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikidata Inspector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/nav.css">
    <style>
        /* ── info.nodes Design System ── */
        :root {
            --bs-body-bg:            #000000;
            --bs-body-color:         rgba(255,255,255,0.82);
            --bs-border-color:       rgb(65,67,69);
            --bs-card-bg:            #0d0d0d;
            --bs-card-border-color:  rgb(65,67,69);
            --bs-primary:            #00ff41;
            --bs-primary-rgb:        104,204,209;
            --bs-secondary-bg:       #111111;
            --bs-tertiary-bg:        #0a0a0a;
            --bs-heading-color:      #ffffff;
            --bs-link-color:         #00ff41;
            --bs-link-hover-color:   #8ad8dc;
            --bs-body-font-family:   'Barlow Condensed', 'Inter', sans-serif;
            --bs-body-font-size:     1rem;
        }

        body { overflow-y:hidden; background:#000; color:rgba(255,255,255,0.82); }

        .main-layout {
            display:grid;
            grid-template-rows:auto 1fr;
            height:100vh;
        }
        .content-wrapper {
            display:grid;
            grid-template-columns:1fr 3fr;
            overflow-y:hidden;
        }
        .scrollable-col {
            overflow-y:auto;
            height:calc(100vh - 100px);
        }
        .list-group-item { cursor:pointer; }
        .list-group-item.active { font-weight:700; }

        /* ── Header ── */
        header {
            background:#000 !important;
            border-bottom:1px solid rgb(65,67,69) !important;
        }
        header h1 {
            font-family:'Barlow Condensed', sans-serif;
            font-weight:700;
            font-size:1.8rem;
            text-transform:uppercase;
            letter-spacing:1.5px;
            color:#ffffff;
        }

        /* ── Sidebar border ── */
        .border-end { border-color:rgb(65,67,69) !important; }
        .border-bottom { border-color:rgb(65,67,69) !important; }

        /* ── Typography ── */
        h6 {
            font-family:'Barlow Condensed', sans-serif;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.6px;
            color:#00ff41;
            font-size:.85rem;
        }
        p.text-muted, .text-muted { color:rgba(255,255,255,0.38) !important; }

        /* ── List group (navigation) ── */
        .list-group-item {
            background-color:#0d0d0d;
            border-color:rgb(65,67,69);
            color:rgba(255,255,255,0.72);
            font-family:'Barlow Condensed', sans-serif;
            font-size:1rem;
        }
        .list-group-item:hover {
            background-color:rgba(104,204,209,0.08);
            color:#ffffff;
        }
        .list-group-item.active {
            background-color:#00ff41;
            border-color:#00ff41;
            color:#000000;
            font-weight:700;
        }
        .list-group-flush .list-group-item { border-right:0; border-left:0; }

        /* ── Form controls ── */
        .form-control {
            background-color:#0d0d0d;
            border-color:rgb(65,67,69);
            color:#ffffff;
            font-family:'Barlow Condensed', sans-serif;
            font-size:1rem;
        }
        .form-control:focus {
            background-color:#0d0d0d;
            border-color:#00ff41;
            color:#ffffff;
            box-shadow:0 0 0 2px rgba(104,204,209,0.2);
        }
        .form-control::placeholder { color:rgba(255,255,255,0.28); }
        .form-check-input:checked { background-color:#00ff41; border-color:#00ff41; }
        .form-check-label { color:rgba(255,255,255,0.55); font-family:'Barlow Condensed', sans-serif; }

        /* ── Spinner ── */
        .spinner-border.text-primary { color:#00ff41 !important; }

        /* ── Alert ── */
        .alert-danger {
            background-color:rgba(239,68,68,0.12);
            border-color:rgba(239,68,68,0.3);
            color:#fca5a5;
        }

        /* ── Results container (dynamic) ── */
        #results-container { color:rgba(255,255,255,0.82); }
        #results-container .table {
            color:rgba(255,255,255,0.82);
            border-color:rgb(65,67,69);
        }
        #results-container .table th,
        #results-container .table td {
            background-color:#0d0d0d;
            border-color:rgb(65,67,69);
            color:rgba(255,255,255,0.82);
        }
        #results-container .table th {
            color:#00ff41;
            font-family:'Barlow Condensed', sans-serif;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.4px;
            white-space:nowrap;
            width:1%;
        }
        #results-container .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color:#111111;
            color:rgba(255,255,255,0.82);
        }
        #results-container a { color:#00ff41; }
        #results-container a:hover { color:#8ad8dc; }

        /* ── Sidebar padding ── */
        .p-3 { color:rgba(255,255,255,0.82); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:#000; }
        ::-webkit-scrollbar-thumb { background:rgb(65,67,69); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:#00ff41; }

        /* ── HR ── */
        hr { border-color:rgb(65,67,69); }

        /* ── Layout offset for global nav ── */
        body { padding-top:44px; }
        .main-layout { height:calc(100vh - 44px); }
        .scrollable-col { height:calc(100vh - 144px); }
    </style>
</head>
<body class="main-layout">

<nav id="in-nav">
  <a href="../" class="in-brand">info<span>.</span>nodes</a>
  <div class="in-links">
    <a href="../crunchbase_scraping/test_startup/" class="in-link">Startup Map</a>
    <a href="../crunchbase_full/"                  class="in-link">Investment Map</a>
    <a href="./"                                   class="in-link active">Wikidata</a>
    <a href="../call-checker_infonodes/"           class="in-link">EU Call Checker</a>
    <span class="in-sep"></span>
    <a href="https://github.com/infonodesETS/manintheloop" target="_blank" class="in-link in-gh">↗ GitHub</a>
  </div>
</nav>

    <header class="container-fluid text-center py-3 border-bottom">
        <h1 id="main-title">Wikidata Inspector</h1>
    </header>

    <div class="content-wrapper">
        <!-- Left Column: Navigation & Search -->
        <div class="border-end">
            <div class="p-3">
                <p class="text-muted">Select a company or enable live search.</p>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" role="switch" id="search-mode-toggle">
                    <label class="form-check-label" for="search-mode-toggle">Enable full Wikidata search</label>
                </div>

                <!-- Local Navigation (Filter + List) -->
                <div id="local-nav-container">
                    <!-- Country Filter -->
                    <div id="country-filter-container" class="mb-3">
                        <h6>Filter by Country</h6>
                        <div id="country-list" class="list-group list-group-flush small scrollable-col" style="max-height: 200px;">
                            <!-- JS will populate this -->
                        </div>
                    </div>

                    <hr>

                    <!-- Local Company List -->
                    <div id="company-list-container" class="scrollable-col">
                        <div id="local-company-list" class="list-group">
                            <!-- JS will populate this -->
                        </div>
                    </div>
                </div>

                <!-- Live Search (Hidden by default) -->
                <div id="live-search-container" class="d-none">
                    <div id="autocomplete-container" class="position-relative">
                        <input type="text" id="search-input" class="form-control" placeholder="Search all of Wikidata..." autocomplete="off">
                        <div id="autocomplete-results" class="list-group w-100 position-absolute"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Results -->
        <div class="scrollable-col">
            <div class="p-3">
                <div id="loader" class="text-center d-none mt-4">
                    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div id="error-container" class="alert alert-danger d-none mt-4" role="alert"></div>
                <div id="results-container" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
